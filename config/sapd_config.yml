# sapd_config.yml — SAPD Calls for Service monitor config
#
# Data source: https://webapp3.sanantonio.gov/policecalls/Calls.aspx
# Shows non-dispositioned calls (actively being worked by officers)
# Updated live by the city — no API key needed

# ── Call types that trigger a Discord alert ──────────────────────────────────
# Case-insensitive partial match against Problem Type field.
# Leave empty ([]) to alert on ALL call types.
alert_on:
  - "ASSAULT"
  - "FAMILY DISTURBANCE"
  - "SHOOTING"
  - "STABBING"
  - "ROBBERY"
  - "HOMICIDE"
  - "SEXUAL ASSAULT"
  - "KIDNAPPING"
  - "SHOTS FIRED"
  - "MISSING PERSON"
  - "PURSUIT"
  - "OFFICER NEEDS HELP"
  - "USE OF FORCE"
  - "MENTAL CRISIS"
  - "SUICIDAL PERSON"
  - "OVERDOSE"
  - "BURGLARY"
  - "AUTO THEFT"
  - "BOMB THREAT"
  - "ACTIVE SHOOTER"

# ── Geographic filters (optional) ────────────────────────────────────────────
# Divisions: NORTH, SOUTH, EAST, WEST, CENTRAL, DOWNTOWN
# Leave empty ([]) to monitor all divisions.
watch_divisions: []

# ── Output settings ──────────────────────────────────────────────────────────
outputs:
  discord: true
  rss: true
  dashboard: true
