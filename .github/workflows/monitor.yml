name: NewsWatch Monitor

on:
  schedule:
    - cron: '0 14 * * *'    # 8:00 AM CDT (14:00 UTC)
    - cron: '0 2 * * *'     # 8:00 PM CDT (02:00 UTC)
  workflow_dispatch:          # manual trigger from Actions tab

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore article DB cache
        uses: actions/cache@v4
        with:
          path: data/seen.db
          key: newswatch-db-${{ github.run_id }}
          restore-keys: |
            newswatch-db-

      - name: Create data dir if missing
        run: mkdir -p data docs

      - name: Install dependencies
        run: pip install --quiet feedparser pyyaml requests beautifulsoup4

      - name: Run NewsWatch
        env:
          DB_PATH: data/seen.db
          DOCS_DIR: docs
          SITE_URL: https://${{ github.repository_owner }}.github.io/news-keyword-monitor
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          CONFIG_PATH: config/topics.yml
          SOURCES_PATH: config/sources.yml
          SAPD_CONFIG_PATH: config/sapd_config.yml
          ENABLE_SAPD: "true"
        run: python src/main.py

      - name: Commit generated docs
        run: |
          git config user.name  "NewsWatch Bot"
          git config user.email "actions@github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: update dashboard $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
